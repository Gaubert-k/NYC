spark.master                     spark://spark-master:7077
spark.driver.memory              1g
spark.executor.memory            2g
spark.executor.cores             2
spark.default.parallelism        8
spark.sql.shuffle.partitions     16
spark.sql.adaptive.enabled       true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.parquet.compression.codec snappy
spark.sql.session.timeZone       America/New_York
# Historique des jobs (Spark History Server — volume local)
spark.eventLog.enabled           true
spark.eventLog.dir               file:/spark-events
spark.eventLog.compress          true
spark.history.fs.logDirectory    file:/spark-events
# Shuffles sur HDFS bind-mount (pas dans ext4.vhdx Docker)
spark.local.dir                  hdfs://namenode:9000/spark-tmp
